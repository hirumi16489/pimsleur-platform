AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Root SAM template for Pimsleur Japanese Platform

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: The stage to deploy the application to
  StackName:
    Type: String
    Description: The name of the stack

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs18.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        NODE_ENV: !Ref Stage
        REGION: !Ref AWS::Region
        STAGE: !Ref Stage

Resources:
  # --- Infrastructure Stacks ---

  NetworkStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/network.yaml
      Parameters:
        StackName: !Ref StackName
  AuthStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/auth.yaml
      Parameters:
        StackName: !Ref StackName
  StorageStack:
    Type: AWS::Serverless::Application
    DependsOn: AuthStack
    Properties:
      Location: stacks/storage.yaml
      Parameters:
        StackName: !Ref StackName
  EventsStack:
    Type: AWS::Serverless::Application
    DependsOn: StorageStack
    Properties:
      Location: stacks/events.yaml
      Parameters:
        StackName: !Ref StackName
  DbStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/database.yaml
      Parameters:
        StackName: !Ref StackName
  LessonProcessingStack:
    Type: AWS::Serverless::Application
    DependsOn: [EventsStack, LayerStack]
    Properties:
      Location: stacks/statemachines/lessonProcessingStateMachine.yaml
      Parameters:
        StackName: !Ref StackName
  ApiStack:
    Type: AWS::Serverless::Application
    DependsOn: [AuthStack, StorageStack, EventsStack, DbStack, LessonProcessingStack, LayerStack]
    Properties:
      Location: stacks/api.yaml
      Parameters:
        Stage: !Ref Stage
        StackName: !Ref StackName
  LayerStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/layer.yaml
      Parameters:
        StackName: !Ref StackName